<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithmic Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            z-index: 100;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .controls::-webkit-scrollbar {
            width: 8px;
        }

        .controls::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .controls::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 136, 0.3);
            border-radius: 4px;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s ease;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .title {
            font-size: 24px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            color: #aaa;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .slider {
            width: 100%;
            appearance: none;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ff88, #0088ff);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .value-display {
            text-align: right;
            color: #00ff88;
            font-size: 14px;
            margin-top: 5px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 136, 255, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
        }

        button:hover {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.3), rgba(0, 136, 255, 0.3));
            transform: translateY(-2px);
        }

        button.active {
            background: linear-gradient(135deg, #00ff88, #0088ff);
            color: #000;
            font-weight: 600;
        }

        .preset-buttons {
            display: grid;
            gap: 8px;
        }

        .preset-btn {
            width: 100%;
            padding: 12px;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .preset-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .preset-btn:hover::before {
            left: 100%;
        }

        .info-panel {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 136, 255, 0.1);
            border-radius: 10px;
            border-left: 3px solid #0088ff;
        }

        .info-title {
            color: #0088ff;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .info-text {
            color: #aaa;
            font-size: 12px;
            line-height: 1.5;
        }

        select {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        select option {
            background: #1a1a1a;
        }

        .color-picker-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-box {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .color-box:hover {
            transform: scale(1.1);
            border-color: #00ff88;
        }

        @media (max-width: 768px) {
            .controls {
                width: 250px;
                padding: 15px;
            }

            .title {
                font-size: 18px;
            }
        }

        .export-btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: linear-gradient(135deg, #ff6b00, #ff00ff);
            border: none;
            font-weight: 600;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            color: #00ff88;
            font-size: 18px;
            font-weight: 600;
        }

        .stat-label {
            color: #666;
            font-size: 10px;
            text-transform: uppercase;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="canvas-container"></div>
        
        <a href="index.html" class="back-link">
            <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            Back to Home
        </a>

        <div class="controls">
            <h1 class="title">Algorithmic Art Lab</h1>
            
            <div class="control-group">
                <label for="artMode">Art Mode</label>
                <select id="artMode">
                    <option value="flowfield">Flow Field</option>
                    <option value="particles">Particle System</option>
                    <option value="fractal">Fractal Tree</option>
                    <option value="neural">Neural Patterns</option>
                    <option value="waves">Wave Interference</option>
                </select>
            </div>

            <div class="preset-buttons">
                <button class="preset-btn" onclick="loadPreset('aurora')">🌌 Aurora Borealis</button>
                <button class="preset-btn" onclick="loadPreset('matrix')">💻 Matrix Rain</button>
                <button class="preset-btn" onclick="loadPreset('cosmos')">✨ Cosmic Dust</button>
                <button class="preset-btn" onclick="loadPreset('electric')">⚡ Electric Dreams</button>
            </div>

            <div class="control-group">
                <label for="complexity">Complexity</label>
                <input type="range" id="complexity" class="slider" min="10" max="200" value="100">
                <div class="value-display" id="complexityValue">100</div>
            </div>

            <div class="control-group">
                <label for="speed">Animation Speed</label>
                <input type="range" id="speed" class="slider" min="0.1" max="5" step="0.1" value="1">
                <div class="value-display" id="speedValue">1.0</div>
            </div>

            <div class="control-group">
                <label for="scale">Scale</label>
                <input type="range" id="scale" class="slider" min="0.5" max="3" step="0.1" value="1">
                <div class="value-display" id="scaleValue">1.0</div>
            </div>

            <div class="control-group">
                <label for="colorMode">Color Scheme</label>
                <div class="color-picker-group">
                    <div class="color-box" style="background: linear-gradient(135deg, #00ff88, #0088ff);" onclick="setColorScheme('cyberpunk')"></div>
                    <div class="color-box" style="background: linear-gradient(135deg, #ff00ff, #00ffff);" onclick="setColorScheme('vaporwave')"></div>
                    <div class="color-box" style="background: linear-gradient(135deg, #ff6b00, #ff00ff);" onclick="setColorScheme('sunset')"></div>
                    <div class="color-box" style="background: linear-gradient(135deg, #fff, #000);" onclick="setColorScheme('monochrome')"></div>
                </div>
            </div>

            <div class="button-group">
                <button onclick="toggleAnimation()">⏸️ Pause</button>
                <button onclick="resetAnimation()">🔄 Reset</button>
                <button onclick="randomize()">🎲 Randomize</button>
                <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="particleCount">0</div>
                    <div class="stat-label">Particles</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="fps">60</div>
                    <div class="stat-label">FPS</div>
                </div>
            </div>

            <div class="info-panel">
                <div class="info-title">Neural Flow Field</div>
                <div class="info-text" id="modeDescription">
                    Particles follow a flow field generated by Perlin noise, creating organic, neural-like patterns that evolve over time.
                </div>
            </div>

            <button class="export-btn" onclick="saveArtwork()">💾 Save Artwork</button>
        </div>
    </div>

    <script>
        // Global variables
        let particles = [];
        let flowField = [];
        let currentMode = 'flowfield';
        let colorScheme = 'cyberpunk';
        let isAnimating = true;
        let complexity = 100;
        let speed = 1;
        let scale = 1;
        let time = 0;
        let cols, rows;
        let zoff = 0;
        let frameCounter = 0;

        // Color schemes
        const colorSchemes = {
            cyberpunk: ['#00ff88', '#00ffff', '#0088ff', '#ff00ff'],
            vaporwave: ['#ff00ff', '#00ffff', '#ff69b4', '#8b00ff'],
            sunset: ['#ff6b00', '#ff00ff', '#ffaa00', '#ff0066'],
            monochrome: ['#ffffff', '#cccccc', '#888888', '#444444']
        };

        // Mode descriptions
        const modeDescriptions = {
            flowfield: 'Particles follow a flow field generated by Perlin noise, creating organic, neural-like patterns that evolve over time.',
            particles: 'A dynamic particle system with forces, creating beautiful emergent behaviors and patterns.',
            fractal: 'Recursive fractal trees that grow and sway, inspired by natural branching patterns.',
            neural: 'Visualization of neural network activations, showing how information flows through layers.',
            waves: 'Interference patterns from multiple wave sources create mesmerizing ripple effects.'
        };

        // Particle class
        class Particle {
            constructor() {
                this.pos = createVector(random(width), random(height));
                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.maxSpeed = 2;
                this.prevPos = this.pos.copy();
                this.color = random(colorSchemes[colorScheme]);
                this.size = random(1, 3);
                this.lifespan = 255;
            }

            update() {
                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed * speed);
                this.pos.add(this.vel);
                this.acc.mult(0);
                this.lifespan -= 0.5;

                if (this.lifespan < 0) {
                    this.reset();
                }
            }

            follow(vectors) {
                let x = floor(this.pos.x / scale);
                let y = floor(this.pos.y / scale);
                let index = x + y * cols;
                let force = vectors[index];
                if (force) {
                    this.applyForce(force);
                }
            }

            applyForce(force) {
                this.acc.add(force);
            }

            show() {
                let c = color(this.color);
                c.setAlpha(this.lifespan * 0.5);
                stroke(c);
                strokeWeight(this.size);
                line(this.pos.x, this.pos.y, this.prevPos.x, this.prevPos.y);
                this.updatePrev();
            }

            updatePrev() {
                this.prevPos.x = this.pos.x;
                this.prevPos.y = this.pos.y;
            }

            edges() {
                if (this.pos.x > width) {
                    this.pos.x = 0;
                    this.updatePrev();
                }
                if (this.pos.x < 0) {
                    this.pos.x = width;
                    this.updatePrev();
                }
                if (this.pos.y > height) {
                    this.pos.y = 0;
                    this.updatePrev();
                }
                if (this.pos.y < 0) {
                    this.pos.y = height;
                    this.updatePrev();
                }
            }

            reset() {
                this.pos = createVector(random(width), random(height));
                this.prevPos = this.pos.copy();
                this.lifespan = 255;
                this.color = random(colorSchemes[colorScheme]);
            }
        }

        // p5.js setup
        function setup() {
            let canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('canvas-container');
            colorMode(RGB, 255);
            background(10, 10, 10);
            
            scale = 20;
            cols = floor(width / scale);
            rows = floor(height / scale);
            
            flowField = new Array(cols * rows);
            
            // Initialize particles
            for (let i = 0; i < complexity; i++) {
                particles.push(new Particle());
            }
        }

        // p5.js draw loop
        function draw() {
            if (!isAnimating) return;
            
            // Semi-transparent background for trail effect
            fill(10, 10, 10, 25);
            noStroke();
            rect(0, 0, width, height);
            
            switch(currentMode) {
                case 'flowfield':
                    drawFlowField();
                    break;
                case 'particles':
                    drawParticleSystem();
                    break;
                case 'fractal':
                    drawFractalTree();
                    break;
                case 'neural':
                    drawNeuralPatterns();
                    break;
                case 'waves':
                    drawWaveInterference();
                    break;
            }
            
            time += 0.01 * speed;
            frameCounter++;
            
            // Update stats
            if (frameCounter % 30 === 0) {
                document.getElementById('fps').textContent = Math.round(frameRate());
                document.getElementById('particleCount').textContent = particles.length;
            }
        }

        function drawFlowField() {
            let yoff = 0;
            for (let y = 0; y < rows; y++) {
                let xoff = 0;
                for (let x = 0; x < cols; x++) {
                    let index = x + y * cols;
                    let angle = noise(xoff, yoff, zoff) * TWO_PI * 4;
                    let v = p5.Vector.fromAngle(angle);
                    v.setMag(0.5);
                    flowField[index] = v;
                    xoff += 0.1;
                }
                yoff += 0.1;
            }
            zoff += 0.003 * speed;
            
            for (let particle of particles) {
                particle.follow(flowField);
                particle.update();
                particle.edges();
                particle.show();
            }
        }

        function drawParticleSystem() {
            let mouse = createVector(mouseX, mouseY);
            
            for (let particle of particles) {
                // Attraction to mouse
                let attraction = p5.Vector.sub(mouse, particle.pos);
                attraction.setMag(0.1);
                particle.applyForce(attraction);
                
                // Perlin noise force
                let angle = noise(particle.pos.x * 0.01, particle.pos.y * 0.01, time) * TWO_PI;
                let force = p5.Vector.fromAngle(angle);
                force.mult(0.1);
                particle.applyForce(force);
                
                particle.update();
                particle.edges();
                particle.show();
            }
        }

        function drawFractalTree() {
            push();
            translate(width / 2, height);
            stroke(colorSchemes[colorScheme][0]);
            branch(150 * scale);
            pop();
        }

        function branch(len) {
            strokeWeight(map(len, 10, 100, 1, 10));
            line(0, 0, 0, -len);
            translate(0, -len);
            
            if (len > 10) {
                let angle = map(sin(time), -1, 1, PI/6, PI/4);
                push();
                rotate(angle);
                branch(len * 0.67);
                pop();
                push();
                rotate(-angle);
                branch(len * 0.67);
                pop();
            } else {
                // Draw leaves
                noStroke();
                fill(colorSchemes[colorScheme][1]);
                ellipse(0, 0, 5, 5);
            }
        }

        function drawNeuralPatterns() {
            let spacing = 30 * scale;
            let layers = 5;
            let neuronsPerLayer = floor(height / spacing);
            
            for (let l = 0; l < layers; l++) {
                let x = (l + 1) * width / (layers + 1);
                
                for (let n = 0; n < neuronsPerLayer; n++) {
                    let y = (n + 1) * spacing;
                    
                    // Draw connections to next layer
                    if (l < layers - 1) {
                        for (let nn = 0; nn < neuronsPerLayer; nn++) {
                            let nextX = (l + 2) * width / (layers + 1);
                            let nextY = (nn + 1) * spacing;
                            
                            let weight = noise(l, n, nn + time) * 255;
                            stroke(colorSchemes[colorScheme][0], weight);
                            strokeWeight(0.5);
                            line(x, y, nextX, nextY);
                        }
                    }
                    
                    // Draw neuron
                    let activation = noise(l, n, time) * 255;
                    fill(colorSchemes[colorScheme][1], activation);
                    noStroke();
                    ellipse(x, y, 20, 20);
                }
            }
        }

        function drawWaveInterference() {
            loadPixels();
            let sources = [
                { x: width * 0.3, y: height * 0.3 },
                { x: width * 0.7, y: height * 0.7 },
                { x: width * 0.5, y: height * 0.5 }
            ];
            
            for (let x = 0; x < width; x += 4) {
                for (let y = 0; y < height; y += 4) {
                    let wave = 0;
                    
                    for (let source of sources) {
                        let d = dist(x, y, source.x, source.y);
                        wave += sin(d * 0.05 - time * 2);
                    }
                    
                    wave = map(wave, -sources.length, sources.length, 0, 255);
                    let c = color(colorSchemes[colorScheme][floor(wave / 64)]);
                    fill(c);
                    noStroke();
                    rect(x, y, 4, 4);
                }
            }
        }

        // Control functions
        function setColorScheme(scheme) {
            colorScheme = scheme;
            particles.forEach(p => p.color = random(colorSchemes[colorScheme]));
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            event.target.textContent = isAnimating ? '⏸️ Pause' : '▶️ Play';
        }

        function resetAnimation() {
            background(10, 10, 10);
            particles = [];
            for (let i = 0; i < complexity; i++) {
                particles.push(new Particle());
            }
            time = 0;
        }

        function randomize() {
            complexity = random(50, 200);
            speed = random(0.5, 2);
            scale = random(0.5, 2);
            document.getElementById('complexity').value = complexity;
            document.getElementById('speed').value = speed;
            document.getElementById('scale').value = scale;
            document.getElementById('complexityValue').textContent = Math.round(complexity);
            document.getElementById('speedValue').textContent = speed.toFixed(1);
            document.getElementById('scaleValue').textContent = scale.toFixed(1);
            resetAnimation();
        }

        function saveArtwork() {
            saveCanvas('algorithmic-art', 'png');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function loadPreset(preset) {
            switch(preset) {
                case 'aurora':
                    currentMode = 'waves';
                    setColorScheme('cyberpunk');
                    complexity = 150;
                    speed = 0.5;
                    break;
                case 'matrix':
                    currentMode = 'particles';
                    setColorScheme('monochrome');
                    complexity = 200;
                    speed = 2;
                    break;
                case 'cosmos':
                    currentMode = 'flowfield';
                    setColorScheme('vaporwave');
                    complexity = 100;
                    speed = 1;
                    break;
                case 'electric':
                    currentMode = 'neural';
                    setColorScheme('sunset');
                    complexity = 80;
                    speed = 1.5;
                    break;
            }
            
            document.getElementById('artMode').value = currentMode;
            document.getElementById('complexity').value = complexity;
            document.getElementById('speed').value = speed;
            document.getElementById('complexityValue').textContent = complexity;
            document.getElementById('speedValue').textContent = speed.toFixed(1);
            resetAnimation();
        }

        // Event listeners
        document.getElementById('artMode').addEventListener('change', (e) => {
            currentMode = e.target.value;
            document.getElementById('modeDescription').textContent = modeDescriptions[currentMode];
            resetAnimation();
        });

        document.getElementById('complexity').addEventListener('input', (e) => {
            complexity = parseInt(e.target.value);
            document.getElementById('complexityValue').textContent = complexity;
            
            // Adjust particle count
            while (particles.length < complexity) {
                particles.push(new Particle());
            }
            while (particles.length > complexity) {
                particles.pop();
            }
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            speed = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = speed.toFixed(1);
        });

        document.getElementById('scale').addEventListener('input', (e) => {
            scale = parseFloat(e.target.value) * 20;
            document.getElementById('scaleValue').textContent = parseFloat(e.target.value).toFixed(1);
            cols = floor(width / scale);
            rows = floor(height / scale);
            flowField = new Array(cols * rows);
        });

        // Window resize
        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            cols = floor(width / scale);
            rows = floor(height / scale);
            flowField = new Array(cols * rows);
        }
    </script>
</body>
</html>

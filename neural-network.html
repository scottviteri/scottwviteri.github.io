<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Network Builder - Scott Viteri</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #0f1a1f 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 18px;
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00ff88;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            gap: 30px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
        }

        .panel-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: #00ff88;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #networkCanvas {
            width: 100%;
            height: 600px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
            cursor: grab;
        }

        #networkCanvas:active {
            cursor: grabbing;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            color: #aaa;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .control-group input,
        .control-group select {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00ff88, #0088ff);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        button.danger {
            background: linear-gradient(135deg, #ff0066, #ff3366);
        }

        .layer-list {
            margin-top: 20px;
        }

        .layer-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .layer-info {
            flex: 1;
        }

        .layer-name {
            font-weight: 600;
            color: #00ff88;
        }

        .layer-details {
            font-size: 12px;
            color: #888;
            margin-top: 3px;
        }

        .remove-btn {
            padding: 5px 10px;
            background: rgba(255, 0, 100, 0.2);
            border: 1px solid rgba(255, 0, 100, 0.5);
            border-radius: 5px;
            color: #ff3366;
            cursor: pointer;
            font-size: 12px;
        }

        .training-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dataset-preview {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .data-point {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            position: relative;
        }

        .data-point.class-0 {
            border: 2px solid #00ff88;
        }

        .data-point.class-1 {
            border: 2px solid #ff00ff;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .metric-value {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #00ff88, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .metric-label {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }

        .loss-chart {
            margin-top: 20px;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 10px;
        }

        #lossCanvas {
            width: 100%;
            height: 100%;
        }

        .activation-preview {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 136, 255, 0.1);
            border-radius: 10px;
        }

        .activation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .neuron-activation {
            height: 60px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: white;
            font-weight: 600;
        }

        .info-tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
        }

        .info-tooltip:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            white-space: nowrap;
            font-size: 12px;
            z-index: 1000;
        }

        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 32px;
            }
        }

        .training-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 8px;
            margin-top: 10px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
        }

        .status-indicator.training {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">
        <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
            <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        Back to Home
    </a>

    <div class="container">
        <header>
            <h1>Neural Network Builder</h1>
            <p class="subtitle">Build, visualize, and train neural networks with interactive backpropagation</p>
        </header>

        <div class="main-layout">
            <!-- Architecture Panel -->
            <div class="panel">
                <div class="panel-title">🏗️ Architecture</div>
                
                <div class="control-group">
                    <label for="layerType">Layer Type</label>
                    <select id="layerType">
                        <option value="dense">Dense (Fully Connected)</option>
                        <option value="conv">Convolutional</option>
                        <option value="dropout">Dropout</option>
                        <option value="batchnorm">Batch Normalization</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="neurons">Number of Neurons</label>
                    <input type="number" id="neurons" min="1" max="512" value="16">
                </div>

                <div class="control-group">
                    <label for="activation">Activation Function</label>
                    <select id="activation">
                        <option value="relu">ReLU</option>
                        <option value="sigmoid">Sigmoid</option>
                        <option value="tanh">Tanh</option>
                        <option value="softmax">Softmax</option>
                        <option value="linear">Linear</option>
                    </select>
                </div>

                <button onclick="addLayer()">Add Layer</button>
                <button class="secondary" onclick="autoArchitecture()">Auto-Generate</button>
                
                <div class="layer-list" id="layerList">
                    <div class="layer-item">
                        <div class="layer-info">
                            <div class="layer-name">Input Layer</div>
                            <div class="layer-details">2 neurons</div>
                        </div>
                    </div>
                </div>

                <button class="danger" onclick="clearNetwork()">Clear Network</button>
            </div>

            <!-- Visualization Panel -->
            <div class="panel">
                <div class="panel-title">🧠 Network Visualization</div>
                <canvas id="networkCanvas"></canvas>
                
                <div class="training-status">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="statusText">Ready to train</span>
                </div>
            </div>

            <!-- Training Panel -->
            <div class="panel">
                <div class="panel-title">🎯 Training</div>
                
                <div class="control-group">
                    <label for="dataset">Dataset</label>
                    <select id="dataset" onchange="loadDataset()">
                        <option value="xor">XOR Problem</option>
                        <option value="circles">Two Circles</option>
                        <option value="spiral">Spiral</option>
                        <option value="moons">Two Moons</option>
                    </select>
                </div>

                <div class="dataset-preview" id="datasetPreview">
                    <!-- Dataset visualization -->
                </div>

                <div class="training-section">
                    <div class="control-group">
                        <label for="learningRate">Learning Rate</label>
                        <input type="range" id="learningRate" min="0.001" max="1" step="0.001" value="0.01">
                        <div style="text-align: right; color: #00ff88; font-size: 12px;">
                            <span id="lrValue">0.01</span>
                        </div>
                    </div>

                    <div class="control-group">
                        <label for="batchSize">Batch Size</label>
                        <input type="number" id="batchSize" min="1" max="64" value="32">
                    </div>

                    <div class="control-group">
                        <label for="epochs">Epochs</label>
                        <input type="number" id="epochs" min="1" max="1000" value="100">
                    </div>

                    <button onclick="startTraining()">Start Training</button>
                    <button class="secondary" onclick="pauseTraining()">Pause</button>
                    <button class="secondary" onclick="stepTraining()">Single Step</button>
                </div>

                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value" id="lossValue">0.000</div>
                        <div class="metric-label">Loss</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="accuracyValue">0%</div>
                        <div class="metric-label">Accuracy</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="epochValue">0</div>
                        <div class="metric-label">Epoch</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="iterValue">0</div>
                        <div class="metric-label">Iterations</div>
                    </div>
                </div>

                <div class="loss-chart">
                    <canvas id="lossCanvas"></canvas>
                </div>

                <div class="activation-preview">
                    <div style="color: #0088ff; font-weight: 600; margin-bottom: 10px;">
                        Hidden Layer Activations
                    </div>
                    <div class="activation-grid" id="activationGrid">
                        <!-- Neuron activations will be shown here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Neural Network Implementation
        class Layer {
            constructor(inputSize, outputSize, activation = 'relu') {
                this.weights = this.initializeWeights(inputSize, outputSize);
                this.bias = new Array(outputSize).fill(0);
                this.activation = activation;
                this.input = null;
                this.output = null;
                this.gradients = null;
            }

            initializeWeights(inputSize, outputSize) {
                // Xavier initialization
                const weights = [];
                const scale = Math.sqrt(2.0 / inputSize);
                for (let i = 0; i < inputSize; i++) {
                    weights[i] = [];
                    for (let j = 0; j < outputSize; j++) {
                        weights[i][j] = (Math.random() * 2 - 1) * scale;
                    }
                }
                return weights;
            }

            forward(input) {
                this.input = input;
                const output = [];
                
                for (let j = 0; j < this.weights[0].length; j++) {
                    let sum = this.bias[j];
                    for (let i = 0; i < input.length; i++) {
                        sum += input[i] * this.weights[i][j];
                    }
                    output[j] = sum;
                }
                
                this.output = this.applyActivation(output);
                return this.output;
            }

            applyActivation(x) {
                switch (this.activation) {
                    case 'relu':
                        return x.map(val => Math.max(0, val));
                    case 'sigmoid':
                        return x.map(val => 1 / (1 + Math.exp(-val)));
                    case 'tanh':
                        return x.map(val => Math.tanh(val));
                    case 'softmax':
                        const max = Math.max(...x);
                        const exp = x.map(val => Math.exp(val - max));
                        const sum = exp.reduce((a, b) => a + b, 0);
                        return exp.map(val => val / sum);
                    default:
                        return x;
                }
            }

            activationDerivative(x) {
                switch (this.activation) {
                    case 'relu':
                        return x.map(val => val > 0 ? 1 : 0);
                    case 'sigmoid':
                        const sig = this.applyActivation(x);
                        return sig.map(val => val * (1 - val));
                    case 'tanh':
                        const tanh = this.applyActivation(x);
                        return tanh.map(val => 1 - val * val);
                    default:
                        return x.map(() => 1);
                }
            }
        }

        class NeuralNetwork {
            constructor() {
                this.layers = [];
                this.learningRate = 0.01;
            }

            addLayer(neurons, activation) {
                const inputSize = this.layers.length === 0 ? 2 : 
                    this.layers[this.layers.length - 1].weights[0].length;
                this.layers.push(new Layer(inputSize, neurons, activation));
            }

            forward(input) {
                let output = input;
                for (const layer of this.layers) {
                    output = layer.forward(output);
                }
                return output;
            }

            backward(target) {
                const output = this.layers[this.layers.length - 1].output;
                let error = output.map((val, i) => val - target[i]);
                
                // Backpropagate through layers
                for (let i = this.layers.length - 1; i >= 0; i--) {
                    const layer = this.layers[i];
                    const newError = new Array(layer.weights.length).fill(0);
                    
                    // Calculate gradients
                    for (let j = 0; j < layer.weights[0].length; j++) {
                        for (let k = 0; k < layer.weights.length; k++) {
                            const gradient = error[j] * layer.input[k];
                            layer.weights[k][j] -= this.learningRate * gradient;
                            newError[k] += error[j] * layer.weights[k][j];
                        }
                        layer.bias[j] -= this.learningRate * error[j];
                    }
                    
                    error = newError;
                }
            }

            calculateLoss(predictions, targets) {
                // Mean squared error
                let loss = 0;
                for (let i = 0; i < predictions.length; i++) {
                    const diff = predictions[i] - targets[i];
                    loss += diff * diff;
                }
                return loss / predictions.length;
            }
        }

        // Global variables
        let network = new NeuralNetwork();
        let dataset = [];
        let labels = [];
        let isTraining = false;
        let currentEpoch = 0;
        let totalIterations = 0;
        let lossHistory = [];
        let networkLayers = [{ type: 'input', neurons: 2 }];

        // Canvas setup
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        const lossCanvas = document.getElementById('lossCanvas');
        const lossCtx = lossCanvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            lossCanvas.width = lossCanvas.clientWidth;
            lossCanvas.height = lossCanvas.clientHeight;
        }

        // Generate datasets
        function generateXORDataset() {
            return {
                data: [[0, 0], [0, 1], [1, 0], [1, 1]],
                labels: [[0], [1], [1], [0]]
            };
        }

        function generateCirclesDataset(n = 100) {
            const data = [];
            const labels = [];
            
            for (let i = 0; i < n; i++) {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.random();
                
                if (r < 0.5) {
                    // Inner circle
                    const radius = r * 0.4;
                    data.push([
                        radius * Math.cos(angle),
                        radius * Math.sin(angle)
                    ]);
                    labels.push([0]);
                } else {
                    // Outer circle
                    const radius = 0.6 + (r - 0.5) * 0.4;
                    data.push([
                        radius * Math.cos(angle),
                        radius * Math.sin(angle)
                    ]);
                    labels.push([1]);
                }
            }
            
            return { data, labels };
        }

        function generateSpiralDataset(n = 100) {
            const data = [];
            const labels = [];
            
            for (let i = 0; i < n / 2; i++) {
                const angle = i / (n / 2) * Math.PI * 3;
                const r = i / (n / 2);
                
                // First spiral
                data.push([
                    r * Math.cos(angle) * 0.5,
                    r * Math.sin(angle) * 0.5
                ]);
                labels.push([0]);
                
                // Second spiral
                data.push([
                    r * Math.cos(angle + Math.PI) * 0.5,
                    r * Math.sin(angle + Math.PI) * 0.5
                ]);
                labels.push([1]);
            }
            
            return { data, labels };
        }

        // UI Functions
        function addLayer() {
            const type = document.getElementById('layerType').value;
            const neurons = parseInt(document.getElementById('neurons').value);
            const activation = document.getElementById('activation').value;
            
            networkLayers.push({ type, neurons, activation });
            network.addLayer(neurons, activation);
            
            updateLayerList();
            drawNetwork();
        }

        function updateLayerList() {
            const list = document.getElementById('layerList');
            list.innerHTML = `
                <div class="layer-item">
                    <div class="layer-info">
                        <div class="layer-name">Input Layer</div>
                        <div class="layer-details">2 neurons</div>
                    </div>
                </div>
            `;
            
            networkLayers.slice(1).forEach((layer, index) => {
                const item = document.createElement('div');
                item.className = 'layer-item';
                item.innerHTML = `
                    <div class="layer-info">
                        <div class="layer-name">Layer ${index + 1} (${layer.type})</div>
                        <div class="layer-details">${layer.neurons} neurons, ${layer.activation}</div>
                    </div>
                    <button class="remove-btn" onclick="removeLayer(${index + 1})">Remove</button>
                `;
                list.appendChild(item);
            });
        }

        function removeLayer(index) {
            networkLayers.splice(index, 1);
            network.layers.splice(index - 1, 1);
            updateLayerList();
            drawNetwork();
        }

        function clearNetwork() {
            network = new NeuralNetwork();
            networkLayers = [{ type: 'input', neurons: 2 }];
            updateLayerList();
            drawNetwork();
        }

        function autoArchitecture() {
            clearNetwork();
            network.addLayer(8, 'relu');
            network.addLayer(6, 'relu');
            network.addLayer(1, 'sigmoid');
            
            networkLayers = [
                { type: 'input', neurons: 2 },
                { type: 'dense', neurons: 8, activation: 'relu' },
                { type: 'dense', neurons: 6, activation: 'relu' },
                { type: 'dense', neurons: 1, activation: 'sigmoid' }
            ];
            
            updateLayerList();
            drawNetwork();
        }

        function loadDataset() {
            const datasetType = document.getElementById('dataset').value;
            
            switch (datasetType) {
                case 'xor':
                    const xor = generateXORDataset();
                    dataset = xor.data;
                    labels = xor.labels;
                    break;
                case 'circles':
                    const circles = generateCirclesDataset();
                    dataset = circles.data;
                    labels = circles.labels;
                    break;
                case 'spiral':
                    const spiral = generateSpiralDataset();
                    dataset = spiral.data;
                    labels = spiral.labels;
                    break;
                default:
                    const moons = generateCirclesDataset();
                    dataset = moons.data;
                    labels = moons.labels;
            }
            
            visualizeDataset();
        }

        function visualizeDataset() {
            const preview = document.getElementById('datasetPreview');
            preview.innerHTML = '';
            
            // Show first 10 data points
            for (let i = 0; i < Math.min(10, dataset.length); i++) {
                const point = document.createElement('div');
                point.className = `data-point class-${labels[i][0]}`;
                point.textContent = `${dataset[i][0].toFixed(1)},${dataset[i][1].toFixed(1)}`;
                preview.appendChild(point);
            }
        }

        function drawNetwork() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (networkLayers.length === 1) return;
            
            const layerSpacing = canvas.width / (networkLayers.length + 1);
            const maxNeurons = Math.max(...networkLayers.map(l => l.neurons));
            
            // Draw connections
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.2)';
            ctx.lineWidth = 0.5;
            
            for (let l = 0; l < networkLayers.length - 1; l++) {
                const x1 = (l + 1) * layerSpacing;
                const x2 = (l + 2) * layerSpacing;
                const neurons1 = networkLayers[l].neurons;
                const neurons2 = networkLayers[l + 1].neurons;
                const spacing1 = canvas.height / (neurons1 + 1);
                const spacing2 = canvas.height / (neurons2 + 1);
                
                for (let i = 0; i < neurons1; i++) {
                    for (let j = 0; j < neurons2; j++) {
                        const y1 = (i + 1) * spacing1;
                        const y2 = (j + 1) * spacing2;
                        
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        
                        // Color based on weight value if network is trained
                        if (network.layers[l] && network.layers[l].weights[i] && network.layers[l].weights[i][j]) {
                            const weight = network.layers[l].weights[i][j];
                            const intensity = Math.min(Math.abs(weight), 1);
                            ctx.strokeStyle = weight > 0 ? 
                                `rgba(0, 255, 136, ${intensity * 0.5})` : 
                                `rgba(255, 0, 100, ${intensity * 0.5})`;
                        }
                        
                        ctx.stroke();
                    }
                }
            }
            
            // Draw neurons
            for (let l = 0; l < networkLayers.length; l++) {
                const x = (l + 1) * layerSpacing;
                const neurons = networkLayers[l].neurons;
                const spacing = canvas.height / (neurons + 1);
                
                for (let i = 0; i < neurons; i++) {
                    const y = (i + 1) * spacing;
                    
                    // Neuron glow effect
                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, 20);
                    gradient.addColorStop(0, 'rgba(0, 136, 255, 0.8)');
                    gradient.addColorStop(1, 'rgba(0, 136, 255, 0)');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(x, y, 20, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Neuron circle
                    ctx.fillStyle = l === 0 ? '#00ff88' : 
                                   l === networkLayers.length - 1 ? '#ff00ff' : '#0088ff';
                    ctx.beginPath();
                    ctx.arc(x, y, 10, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Layer label
                ctx.fillStyle = '#888';
                ctx.font = '12px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(
                    l === 0 ? 'Input' : 
                    l === networkLayers.length - 1 ? 'Output' : 
                    `Hidden ${l}`,
                    x, canvas.height - 10
                );
            }
        }

        function drawLossChart() {
            lossCtx.clearRect(0, 0, lossCanvas.width, lossCanvas.height);
            
            if (lossHistory.length < 2) return;
            
            const maxLoss = Math.max(...lossHistory);
            const minLoss = Math.min(...lossHistory);
            const range = maxLoss - minLoss || 1;
            
            lossCtx.strokeStyle = '#00ff88';
            lossCtx.lineWidth = 2;
            lossCtx.beginPath();
            
            lossHistory.forEach((loss, i) => {
                const x = (i / (lossHistory.length - 1)) * lossCanvas.width;
                const y = lossCanvas.height - ((loss - minLoss) / range) * lossCanvas.height * 0.9 - 10;
                
                if (i === 0) {
                    lossCtx.moveTo(x, y);
                } else {
                    lossCtx.lineTo(x, y);
                }
            });
            
            lossCtx.stroke();
        }

        async function trainStep() {
            let epochLoss = 0;
            let correct = 0;
            
            // Shuffle dataset
            const indices = Array.from({ length: dataset.length }, (_, i) => i);
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            
            // Train on batch
            const batchSize = parseInt(document.getElementById('batchSize').value);
            for (let i = 0; i < dataset.length; i += batchSize) {
                let batchLoss = 0;
                
                for (let j = i; j < Math.min(i + batchSize, dataset.length); j++) {
                    const idx = indices[j];
                    const output = network.forward(dataset[idx]);
                    network.backward(labels[idx]);
                    
                    const loss = network.calculateLoss(output, labels[idx]);
                    batchLoss += loss;
                    
                    if ((output[0] > 0.5 && labels[idx][0] > 0.5) || 
                        (output[0] <= 0.5 && labels[idx][0] <= 0.5)) {
                        correct++;
                    }
                }
                
                epochLoss += batchLoss / Math.min(batchSize, dataset.length - i);
                totalIterations++;
            }
            
            const avgLoss = epochLoss / (dataset.length / batchSize);
            lossHistory.push(avgLoss);
            if (lossHistory.length > 100) lossHistory.shift();
            
            const accuracy = (correct / dataset.length) * 100;
            
            // Update UI
            document.getElementById('lossValue').textContent = avgLoss.toFixed(4);
            document.getElementById('accuracyValue').textContent = accuracy.toFixed(0) + '%';
            document.getElementById('epochValue').textContent = currentEpoch;
            document.getElementById('iterValue').textContent = totalIterations;
            
            drawLossChart();
            updateActivations();
            drawNetwork();
        }

        function updateActivations() {
            if (network.layers.length === 0) return;
            
            const grid = document.getElementById('activationGrid');
            grid.innerHTML = '';
            
            // Get activations for a sample input
            const sampleInput = dataset[0] || [0.5, 0.5];
            network.forward(sampleInput);
            
            // Show first hidden layer activations
            if (network.layers[0] && network.layers[0].output) {
                network.layers[0].output.forEach((activation, i) => {
                    const neuron = document.createElement('div');
                    neuron.className = 'neuron-activation';
                    const intensity = Math.min(Math.abs(activation), 1);
                    neuron.style.background = activation > 0 ?
                        `rgba(0, 255, 136, ${intensity})` :
                        `rgba(255, 0, 100, ${intensity})`;
                    neuron.textContent = activation.toFixed(2);
                    grid.appendChild(neuron);
                });
            }
        }

        async function startTraining() {
            if (network.layers.length === 0) {
                alert('Please add layers to the network first!');
                return;
            }
            
            isTraining = true;
            const epochs = parseInt(document.getElementById('epochs').value);
            network.learningRate = parseFloat(document.getElementById('learningRate').value);
            
            document.getElementById('statusIndicator').classList.add('training');
            document.getElementById('statusText').textContent = 'Training...';
            
            for (let epoch = 0; epoch < epochs && isTraining; epoch++) {
                currentEpoch = epoch + 1;
                await trainStep();
                await new Promise(resolve => setTimeout(resolve, 10));
            }
            
            document.getElementById('statusIndicator').classList.remove('training');
            document.getElementById('statusText').textContent = 'Training complete';
            isTraining = false;
        }

        function pauseTraining() {
            isTraining = false;
            document.getElementById('statusIndicator').classList.remove('training');
            document.getElementById('statusText').textContent = 'Paused';
        }

        async function stepTraining() {
            network.learningRate = parseFloat(document.getElementById('learningRate').value);
            currentEpoch++;
            await trainStep();
        }

        // Event listeners
        document.getElementById('learningRate').addEventListener('input', (e) => {
            document.getElementById('lrValue').textContent = parseFloat(e.target.value).toFixed(3);
        });

        // Initialize
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        loadDataset();
        drawNetwork();
    </script>
</body>
</html>
